name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: pytest tests/ -q

  # Optional: verify the SDK-backed immutable-artifact path when the SDK is present.
  sdk-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: kliewerdaniel/knowledge-compiler-sdk
          path: knowledge-compiler-sdk
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install both packages
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e ./knowledge-compiler-sdk
          pip install pytest
      - name: Run tests with SDK on path
        run: |
          pytest tests/ -q
